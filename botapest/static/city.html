<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Botapest City</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🏙️</text></svg>">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --pink: #f3cfd9; --plum: #3d1832; --plum-soft: #5a2c4d; --gold: #d4a953; --cream: #f9efe3; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh; background: var(--pink);
    background-image: repeating-linear-gradient(45deg, transparent 0 22px, rgba(232,168,189,.35) 22px 44px);
    display: flex; flex-direction: column; align-items: center;
    padding: 28px 16px 40px; color: var(--plum);
  }
  header { text-align: center; margin-bottom: 22px; }
  header h1 { font-family: 'Limelight', cursive; font-size: clamp(28px, 5vw, 52px);
              letter-spacing: .06em; text-shadow: 3px 3px 0 var(--gold); }
  header p { font-family: 'Silkscreen', monospace; font-size: 11px;
             letter-spacing: .18em; text-transform: uppercase; }
  .frame { background: var(--plum); padding: 14px; border: 4px solid var(--gold);
           box-shadow: 0 18px 40px rgba(61,24,50,.45), inset 0 0 0 2px var(--plum-soft); }
  canvas { display: block; image-rendering: pixelated; cursor: grab;
           background: linear-gradient(#241020 0%, #3d1832 55%, #2a1024 100%); }
  canvas:active { cursor: grabbing; }
  #tooltip { position: fixed; display: none; pointer-events: none; z-index: 10;
             background: var(--cream); border: 2px solid var(--plum);
             box-shadow: 3px 3px 0 var(--plum); font-family: 'Silkscreen', monospace;
             font-size: 10px; padding: 4px 8px; max-width: 420px; }
</style>
</head>
<body>
  <header>
    <h1>Botapest City</h1>
    <div></div>
    <p>maisight district plan &middot; drag to pan &middot; scroll to zoom</p>
  </header>
  <div class="frame"><canvas id="city" width="1280" height="720"></canvas></div>
  <div id="tooltip"></div>
  <script src="city-render.js"></script>
  <script src="city-scape.js"></script>
  <script src="city.js"></script>
</body>
</html>
